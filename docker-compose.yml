version: '3.9'

networks:
  shopdeck_backend:
    external: true

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '4000:4000'
    env_file:
      - ./backend/.env
    environment:
      # These override the env_file values to use Docker service names
      # instead of localhost addresses used in local dev.
      PORT: 4000
      PGHOST: postgres
      PGPORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ui:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # Override API_URL to change the baked-in proxy target (e.g. for staging).
        API_URL: ${API_URL:-http://api:4000}
    ports:
      - '80:3000'
    env_file:
      - path: ./.env.local
        required: false
    environment:
      NODE_ENV: production
      API_URL: http://api:4000
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - shopdeck_backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shopdeck}
      POSTGRES_USER: ${POSTGRES_USER:-shopdeck}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shopdeck_dev}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U shopdeck']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
