version: '3.9'

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      PORT: 4000
      PGHOST: postgres
      PGPORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: production
      # Comma-separated list of browser origins allowed to call the API directly.
      # The Next.js proxy (no-origin requests) is always allowed.
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'node -e "require(\"http\").get(\"http://localhost:4000/api/health\", r => process.exit(r.statusCode === 200 ? 0 : 1)).on(\"error\", () => process.exit(1))"']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  ui:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # Override API_URL to change the baked-in proxy target (e.g. for staging).
        API_URL: ${API_URL:-http://api:4000}
    ports:
      - '80:3000'
    env_file:
      - path: ./.env.local
        required: false
    environment:
      NODE_ENV: production
      API_URL: http://api:4000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_DB: ${PGDATABASE:-shopdeck}
      POSTGRES_USER: ${PGUSER:-shopdeck}
      PGPORT: 5432
      # POSTGRES_PASSWORD comes from env_file (backend/.env) — do NOT add it here
      # or Docker Compose will override env_file with a host-shell interpolation.
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${PGUSER:-shopdeck} -p 5432']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
