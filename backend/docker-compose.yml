name: shopdeck

networks:
  backend:
    name: shopdeck_backend
    driver: bridge

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: shopdeck
      POSTGRES_USER: shopdeck
      POSTGRES_PASSWORD: shopdeck_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopdeck -d shopdeck"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - backend

  api:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: shopdeck
      PGUSER: shopdeck
      PGPASSWORD: shopdeck_dev
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET environment variable is required}
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend

volumes:
  postgres_data:
  redis_data:
