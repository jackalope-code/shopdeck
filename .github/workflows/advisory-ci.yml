name: Advisory CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend_checks:
    name: Advisory Frontend Checks
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Frontend tests
        run: npm run test

  feed_checks:
    name: Advisory Feed Checks
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Feed tests
        run: npm run test:feed

  smoke_checks:
    name: Advisory Smoke Checks
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Build app
        run: npm run build

      - name: Start app
        run: npm run start -- --port 3000 &

      - name: Wait for app
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000/login > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "App did not become ready in time."
          exit 1

      - name: Smoke tests
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
        run: npm run test:smoke